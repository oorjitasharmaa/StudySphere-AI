<!DOCTYPE html>
<html>

<head>

    <title>Chat With Notes</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        body{
            margin:0;
            padding:0;
            font-family:'Poppins',sans-serif;
            background:linear-gradient(to right,#141e30,#243b55);
            color:white;

            display:flex;
            justify-content:center;
            align-items:center;

            min-height:100vh;
        }

        .box{
            width:800px;
            background:rgba(255,255,255,0.1);
            padding:40px;
            border-radius:20px;
            backdrop-filter:blur(10px);
        }

        input{
            width:80%;
            padding:12px;
            border:none;
            border-radius:8px;
            margin-bottom:15px;
        }

        button{
            padding:12px 20px;
            border:none;
            border-radius:8px;
            background:#00bfff;
            color:white;
            cursor:pointer;
        }

        .answer{
            margin-top:25px;
            line-height:1.8;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>💬 Chat With Notes</h1>

    <form method="POST">

        <input
            type="text"
            name="question"
            placeholder="Ask anything from your notes..."
            required>

        <button type="submit">
            Ask AI
        </button>

    </form>

    <div class="answer">

        {{ answer }}

    </div>

    <br>

    <a href="/dashboard" style="
        color:white;
        text-decoration:none;
    ">
        ← Back To Dashboard
    </a>

</div>

</body>

</html>
