<!DOCTYPE html>
<html>

<head>

    <title>Signup - StudySphere AI</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Poppins;
            background:linear-gradient(to right,#141e30,#243b55);

            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        .signup-box{

            background-color:rgba(255,255,255,0.1);

            padding:40px;

            width:350px;

            border-radius:15px;

            backdrop-filter:blur(10px);

            color:white;

            text-align:center;
        }

        h1{
            margin-bottom:30px;
        }

        input{

            width:100%;

            padding:12px;

            margin-bottom:20px;

            border:none;

            border-radius:8px;
        }

        button{

            width:100%;

            padding:12px;

            background:#00bfff;

            color:white;

            border:none;

            border-radius:8px;

            cursor:pointer;
        }

        a{
            color:white;
        }

    </style>

</head>

<body>

<div class="signup-box">

<h1>Create Account</h1>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">
Sign Up
</button>

</form>

<br>

<a href="/login">Already have an account?</a>

</div>

</body>

</html>
